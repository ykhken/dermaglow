name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy all domains
        run: |
          echo "=== Starting deploy at $(date) ==="

          # Deploy each domain only if the folder has content
          for domain_dir in $GITHUB_WORKSPACE/*/; do
            domain=$(basename "$domain_dir")
            # Skip hidden folders and non-domain folders
            [[ "$domain" == .* ]] && continue
            [[ "$domain" == "shared" ]] && continue

            # Set destination based on domain structure
            if [ -d "$domain_dir/html" ]; then
              dest="/var/www/$domain/html/"
            else
              dest="/var/www/$domain/"
            fi

            echo "Deploying $domain → $dest"
            mkdir -p "$dest"
            rsync -av --delete "$domain_dir" "$dest"
          done

          echo "=== Deploy completed at $(date) ==="
