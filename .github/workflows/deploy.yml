name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy all domains
        run: |
          echo "=== Starting deploy at $(date) ==="

          # perface.com
          rsync -av --exclude='.github' --exclude='README.md' \
            $GITHUB_WORKSPACE/perface.com/html/ /var/www/perface.com/html/

          # laserkool-perface
          rsync -av $GITHUB_WORKSPACE/laserkool-perface/ /var/www/laserkool-perface/

          # shared files (inc)
          rsync -av $GITHUB_WORKSPACE/inc/ /var/www/inc/

          echo "=== Deploy completed at $(date) ==="
